<div class="counterPage">
    <div id="overlay_permission_banner" style="display:none; padding:20px; text-align:center; margin:20px;">
        <div style="background:#1a1a2e; border:2px solid #E53935; border-radius:12px; padding:30px;">
            <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
            <h2 style="color:#E53935; margin-bottom:12px;" data-i18n="overlay_required">صلاحية الظهور فوق التطبيقات مطلوبة</h2>
            <p style="color:#aaa; margin-bottom:24px; font-size:14px; line-height:1.6;" data-i18n="overlay_desc">يحتاج التطبيق صلاحية "الظهور فوق التطبيقات" لعرض لوحة المنظور العائمة. من فضلك فعّل الخاصية من الإعدادات.</p>
            <a class="mou_btn apply_btn" onclick="requestOverlayAndReload()" style="display:inline-flex; margin:0 auto;">
                <span class="btn_text" data-i18n="open_overlay_settings">فتح الإعدادات</span>
            </a>
        </div>
    </div>
    <div id="resolution_content">
        <div class="main_counter">
            <div class="settings_container" style="padding-bottom:130px">

                <div class="full_setting_container">
                    <div class="setting_container">
                        <div class="setting_data">
                            <h2 data-i18n="resolution">Resolution</h2>
                            <p data-i18n="resolution_desc">Set optimal resolution for the game</p>
                        </div>
                        <div class="setting_input_container">
                            <select class="resolution_select" id="resolution_select" data-custom-select>
                                    <option value="Default">Default</option>
                                    <option value="1440x1080">1440x1080(ipad)</option>
                                    <option value="1920x1440">1920x1440(ipad)</option>
                                    <option value="768x432">768x432</option>
                                    <option value="960x540">960x540</option>
                                    <option value="1024x576">1024x576</option>
                                    <option value="1152x648">1152x648</option>
                                    <option value="1280x800">1280x800(HD)</option>
                                    <option value="1366x768">1366x768</option>
                                    <option value="1440x1080">1440x1080(HD+)</option>
                                    <option value="1600x900">1600x900</option>
                                    <option value="1920x1080">1920x1080</option>
                                    <option value="2160x1080">2160x1080(FHD+)</option>
                                    <option value="2560x1440">2560x1440</option>
                                </select>
                        </div>
                    </div>
                </div>

                <div class="full_setting_container">
                    <div class="setting_container" style="flex-wrap:wrap;align-items:stretch;gap:12px;padding:1rem">
                        <div style="width:100%">
                            <h2 style="font-size:0.9rem;margin:0 0 4px 0;color:#E53935" data-i18n="apply_perspective">تطبيق المنظور</h2>
                        </div>
                        <div style="flex:1;min-width:120px">
                            <label style="display:block;font-size:0.75rem;color:#aaa;margin-bottom:4px" data-i18n="width">Width</label>
                            <input type="number" lang="en" id="persp_width" class="editor-input" value="1920" min="320" max="3840" style="width:100%">
                        </div>
                        <div style="flex:1;min-width:120px">
                            <label style="display:block;font-size:0.75rem;color:#aaa;margin-bottom:4px" data-i18n="height">Height</label>
                            <input type="number" lang="en" id="persp_height" class="editor-input" value="1080" min="240" max="2160" style="width:100%">
                        </div>
                        <div style="flex:1;min-width:120px">
                            <label style="display:block;font-size:0.75rem;color:#aaa;margin-bottom:4px" data-i18n="dpi">DPI</label>
                            <input type="number" lang="en" id="persp_dpi" class="editor-input" value="320" min="120" max="640" style="width:100%">
                        </div>
                    </div>
                </div>

            </div>

            <div class="actions" style="flex-direction:column;gap:0.5rem;background:#0a0a0a;padding:0.75rem;padding-bottom:calc(0.75rem + env(safe-area-inset-bottom, 0));position:sticky;bottom:0;z-index:10">
                <div style="display:flex;gap:0.5rem">
                    <a class="mou_btn apply_btn" onclick="apply_perspective_from_page()" style="flex:1">
                        <span class="btn_text" data-i18n="apply">تطبيق</span>
                    </a>
                    <a class="mou_btn apply_btn" onclick="apply_perspective_and_launch()" style="flex:1">
                        <span class="btn_text" data-i18n="apply_and_launch">تطبيق وفتح اللعبة</span>
                    </a>
                </div>
                <div style="display:flex;gap:0.5rem">
                    <a class="mou_btn apply_btn" onclick="reset_perspective_from_page()" style="flex:1;background:var(--bg-dangr-color)">
                        <span class="btn_text" data-i18n="close_perspective">إغلاق المنظور</span>
                    </a>
                    <a class="mou_btn apply_btn" onclick="reset_reselution()" style="flex:1;background:var(--bg-dangr-color)">
                        <span class="btn_text" data-i18n="reset_resolution">Reset resolution</span>
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>
<script>
function checkOverlayPermission() {
    var banner = document.getElementById('overlay_permission_banner');
    var content = document.getElementById('resolution_content');
    if (typeof mouscripts !== "undefined" && mouscripts.canDrawOverlays()) {
        banner.style.display = 'none';
        content.style.display = 'block';
    } else {
        banner.style.display = 'block';
        content.style.display = 'none';
    }
}
function requestOverlayAndReload() {
    if (typeof mouscripts !== "undefined") {
        mouscripts.requestOverlayPermission();
    }
}
function apply_perspective_from_page() {
    var w = parseInt(document.getElementById('persp_width').value);
    var h = parseInt(document.getElementById('persp_height').value);
    var dpi = parseInt(document.getElementById('persp_dpi').value);
    if (isNaN(w) || isNaN(h) || isNaN(dpi)) return;
    if (typeof mouscripts !== "undefined") {
        mouscripts.applyResolution(w, h, dpi);
    }
}
function reset_perspective_from_page() {
    if (typeof mouscripts !== "undefined") {
        mouscripts.hideAndResetPanel();
    }
}
function apply_perspective_and_launch() {
    var w = parseInt(document.getElementById('persp_width').value);
    var h = parseInt(document.getElementById('persp_height').value);
    var dpi = parseInt(document.getElementById('persp_dpi').value);
    if (isNaN(w) || isNaN(h) || isNaN(dpi)) return;
    if (typeof mouscripts !== "undefined") {
        mouscripts.applyResolution(w, h, dpi);
    }
}
$(document).on('click', '[data-openpopup="resolution_popup"]', function () {
    var sel = document.getElementById('resolution_select');
    if (sel) {
        var val = sel.value;
        if (val && val !== 'Default') {
            var parts = val.split('x');
            if (parts.length === 2) {
                document.getElementById('persp_width').value = parts[0];
                document.getElementById('persp_height').value = parts[1];
            }
        }
    }
});
document.addEventListener('visibilitychange', function() {
    if (!document.hidden) checkOverlayPermission();
});
setTimeout(checkOverlayPermission, 200);
</script>
