<div class="editorPage">
    <div class="main_counter">
        <div class="settings_container" id="editor_container" style="padding-bottom:160px">
            <div class="full_setting_container">
                <div class="setting_container" style="display:block;text-align:center">
                    <h2 style="margin:0;padding:0.5rem" data-i18n="editor_title">Advanced Editor</h2>
                    <p style="color:#b5b5b5;font-size:0.8rem" data-i18n="editor_desc">Edit all properties of active.sav</p>
                </div>
            </div>
            <div id="props_list"></div>
        </div>
        <div class="actions" style="flex-direction:column;gap:0.5rem;background:#0a0a0a;padding:0.75rem;padding-bottom:calc(0.75rem + env(safe-area-inset-bottom, 0));position:sticky;bottom:0;z-index:10">
            <div style="display:flex;gap:0.5rem">
                <a class="mou_btn apply_btn" onclick="save_advanced()" style="flex:1">
                    <span class="btn_text" data-i18n="apply_settings">Apply Settings</span>
                </a>
                <a class="mou_btn apply_btn" onclick="save_advanced_and_launch()" style="flex:1">
                    <span class="btn_text" data-i18n="apply_and_launch">Apply & Launch</span>
                </a>
            </div>
            <a class="mou_btn apply_btn" onclick="reload_advanced()" style="background:var(--main_background)">
                <span class="btn_text" data-i18n="editor_reload">Reload</span>
            </a>
        </div>
    </div>
</div>
<script>
var editor_descs = {
    ar: {
        BattleRenderQuality: 'جودة المعركة (1-6)',
        LobbyRenderQuality: 'جودة اللوبي (1-6)',
        BattleFPS: 'حد FPS الأقصى بالمعركة',
        LobbyFPS: 'حد FPS الأقصى باللوبي',
        BattleRenderStyle: 'فلتر ألوان المعركة',
        LobbyRenderStyle: 'فلتر ألوان اللوبي',
        r_UserQualitySetting: 'إعداد الجودة المخصص',
        r_ShadowQuality: 'جودة الظلال',
        r_ViewDistanceScale: 'مسافة الرؤية',
        r_MaterialQualityLevel: 'جودة الخامات',
        r_PostProcessQuality: 'جودة المعالجة',
        r_TextureQuality: 'جودة النسيج',
        r_EffectsQuality: 'جودة التأثيرات',
        r_FoliageQuality: 'جودة النباتات',
        sg_ResolutionQuality: 'دقة العرض (%)',
        r_Mobile_ContentScaleFactor: 'مقياس المحتوى',
    },
    en: {
        BattleRenderQuality: 'Battle graphics quality (1-6)',
        LobbyRenderQuality: 'Lobby graphics quality (1-6)',
        BattleFPS: 'Max FPS in battle',
        LobbyFPS: 'Max FPS in lobby',
        BattleRenderStyle: 'Battle color filter',
        LobbyRenderStyle: 'Lobby color filter',
        r_UserQualitySetting: 'Custom quality setting',
        r_ShadowQuality: 'Shadow quality',
        r_ViewDistanceScale: 'View distance',
        r_MaterialQualityLevel: 'Material quality',
        r_PostProcessQuality: 'Post-process quality',
        r_TextureQuality: 'Texture quality',
        r_EffectsQuality: 'Effects quality',
        r_FoliageQuality: 'Foliage quality',
        sg_ResolutionQuality: 'Resolution quality (%)',
        r_Mobile_ContentScaleFactor: 'Content scale factor',
    }
};
function getDesc(key) {
    var lang = (typeof current_lang !== 'undefined') ? current_lang : 'en';
    var dict = editor_descs[lang] || editor_descs.en;
    var lookupKey = key.replace(/\./g, '_');
    return dict[lookupKey] || '';
}

var _blobKeys = [];
var _blobEntries = [];
var _blobModes = [];

function load_editor_page() {
    _blobKeys = [];
    _blobEntries = [];
    _blobModes = [];
    if (typeof mouscripts !== "undefined") {
        var raw = mouscripts.get_file_props();
        if (!raw) { document.getElementById('props_list').innerHTML = '<p style="text-align:center;padding:2rem;color:#b5b5b5">' + __('editor_no_file') + '</p>'; return; }
        var decoded = JSON.parse(decodeURIComponent(escape(atob(raw))));
        var html = '';
        var keys = Object.keys(decoded);
        for (var i = 0; i < keys.length; i++) {
            var key = keys[i];
            if (key.toLowerCase().indexOf('ids') !== -1) continue;
            var info = decoded[key];
            var val = info.value;
            var type = info.type;
            var desc = getDesc(key);
            var inputHtml = '';
            if (type === 'BoolProperty') {
                var checked = val === true || val === 'true' ? 'checked' : '';
                inputHtml = '<label class="switch"><input type="checkbox" data-key="' + key + '" ' + checked + '><span class="slider"></span></label>';
            } else if (type === 'IntProperty') {
                inputHtml = '<input type="number" lang="en" class="editor-input" data-key="' + key + '" value="' + val + '" step="1">';
            } else if (type === 'FloatProperty') {
                inputHtml = '<input type="number" lang="en" class="editor-input" data-key="' + key + '" value="' + val + '" step="any">';
            } else if (info.raw === true) {
                var parsed = JSON.parse(mouscripts.parseBlobProperty(key));
                if (parsed.parsed === true) {
                    var blobIdx = _blobKeys.length;
                    _blobKeys.push(key);
                    _blobModes.push(parsed.mode);
                    if (parsed.mode === 'pairs') {
                        _blobEntries.push(parsed.entries);
                        inputHtml = '<div class="blob-entries">';
                        for (var e = 0; e < parsed.entries.length; e++) {
                            var ent = parsed.entries[e];
                            inputHtml += '<div class="blob-entry"><span class="blob-name">' + ent.name + '</span>';
                            inputHtml += '<input type="number" lang="en" class="blob-value" data-blob-idx="' + blobIdx + '" data-entry-idx="' + e + '" value="' + ent.value + '"></div>';
                        }
                        inputHtml += '</div>';
                    } else if (parsed.mode === 'array') {
                        _blobEntries.push({values: parsed.values, valuePos: parsed.valuePos, valueLen: parsed.valueLen, count: parsed.count});
                        inputHtml = '<div class="blob-entries" style="max-height:300px">';
                        for (var e = 0; e < parsed.values.length; e++) {
                            inputHtml += '<div class="blob-entry"><span class="blob-name" style="min-width:40px;max-width:40px">#' + e + '</span>';
                            inputHtml += '<input type="number" lang="en" class="blob-value" data-blob-idx="' + blobIdx + '" data-entry-idx="' + e + '" value="' + parsed.values[e] + '"></div>';
                        }
                        inputHtml += '</div>';
                    }
                } else {
                    var hex = parsed.hex || '';
                    var hexText = hex ? hex.replace(/(..)(..)(..)(..)?/g,'$1 $2 $3 $4 ').replace(/  +/g,' ').trim() : 'Not parsed';
                    inputHtml = '<div style="font-family:monospace;font-size:0.7rem;color:#888;word-break:break-all;padding:4px 0;max-height:100px;overflow-y:auto;direction:ltr">' + hexText + '</div>';
                }
            } else {
                var displayVal = typeof val === 'string' ? val.replace(/"/g,'&quot;') : val;
                inputHtml = '<input type="text" lang="en" class="editor-input" data-key="' + key + '" value="' + displayVal + '">';
            }
            html += '<div class="full_setting_container"><div class="setting_container" style="flex-wrap:wrap;align-items:flex-start;gap:4px"><div style="display:flex;flex-wrap:wrap;align-items:center;gap:24px;width:100%"><h2 style="font-size:0.85rem;word-break:break-all;margin:0;line-height:1.4;flex-shrink:0">' + key + '</h2><div style="flex-shrink:0;max-width:200px">' + inputHtml + '</div></div><p style="font-size:0.65rem;color:#b5b5b5;width:100%;margin:2px 0 0 0">' + desc + '</p></div></div>';
        }
        document.getElementById('props_list').innerHTML = html;
    }
}

function save_advanced() {
    if (typeof mouscripts === "undefined") return;
    for (var b = 0; b < _blobKeys.length; b++) {
        var mode = _blobModes[b];
        if (mode === 'pairs') {
            var entries = _blobEntries[b];
            document.querySelectorAll('.blob-value[data-blob-idx="' + b + '"]').forEach(function(el) {
                var ei = parseInt(el.getAttribute('data-entry-idx'), 10);
                var v = parseInt(el.value, 10);
                if (!isNaN(v)) entries[ei].value = v;
            });
            mouscripts.updateBlobProperty(_blobKeys[b], JSON.stringify(entries));
        } else if (mode === 'array') {
            var info = _blobEntries[b];
            var vals = [];
            document.querySelectorAll('.blob-value[data-blob-idx="' + b + '"]').forEach(function(el) {
                var v = parseInt(el.value, 10);
                if (!isNaN(v)) vals.push(v);
            });
            mouscripts.updateBlobArray(_blobKeys[b], JSON.stringify(vals), info.valuePos, info.valueLen);
        }
    }
    var props = {};
    document.querySelectorAll('.editor-input[data-key]').forEach(function(el) {
        var val = el.value;
        if (val !== '' && !isNaN(val)) {
            val = val.includes('.') ? parseFloat(val) : parseInt(val, 10);
        }
        props[el.getAttribute('data-key')] = val;
    });
    document.querySelectorAll('.switch input[type=checkbox][data-key]').forEach(function(el) {
        props[el.getAttribute('data-key')] = el.checked;
    });
    mouscripts.apply_file_props(JSON.stringify(props));
}

function reload_advanced() {
    load_editor_page();
    if (typeof mouscripts !== "undefined") {
        mouscripts.showToast(__('reloaded'));
    }
}
load_editor_page();
</script>
